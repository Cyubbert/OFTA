<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Out for the Ancients</title>
    <link rel="stylesheet" href="./css/theme.css" />
</head>

<body>

<article class="page sans">

    <header>
        <img
                class="page-cover-image"
                src="./assets/images/AUGH.png"
                alt="Cover image"
        />

        <h1 class="page-title">Out for the Ancients</h1>
    </header>

    <div class="page-body">
        <div class="column-list">

            <div class="column column-small">
                <figure class="source">
                    <iframe
                            src="https://open.spotify.com/embed/playlist/3Frb2hSA7fBOCn4m5KpPoY"
                            width="100%"
                            height="380"
                            frameborder="0"
                            allowtransparency="true"
                            allow="encrypted-media">
                    </iframe>
                </figure>
            </div>

            <div class="column column-large">
                <section class="collection-content">
                    <h3 class="collection-title">World &amp; Deities</h3>

                    <div class="cards-container">
                        <div class="card">
                            <img src="./assets/images/Map.png" alt="Norrun Icon">
                            <div class="card-name"><a href="./world/norrun.html">Norrun</a></div>
                        </div>

                        <div class="card">
                            <img src="./assets/images/2.png" alt="Talona Icon">
                            <div class="card-name"><a href="./world/talona.html">Talona</a></div>
                        </div>

                        <div class="card">
                            <img src="./assets/images/Liira/icon.png" alt="Liira Icon">
                            <div class="card-name"><a href="./world/liira.html">Liira</a></div>
                        </div>

                        <div class="card">
                            <img src="./assets/images/Illustration.png" alt="Sune Icon">
                            <div class="card-name"><a href="./world/sune.html">Sune</a></div>
                        </div>
                    </div>

                </section>
            </div>

        </div>
    </div>

</article>

</body>
</html>
